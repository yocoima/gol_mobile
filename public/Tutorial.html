<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Tutorial — GOL</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #060d14; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  #root { height: 100%; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideLeft { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideRight { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } 50% { box-shadow: 0 0 0 8px rgba(34,197,94,0.18); } }
  @keyframes cardFloat { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-8px) rotate(-2deg); } }
  @keyframes cardFloatR { 0%,100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
  @keyframes ballBounce { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-14px); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes sparkle { 0%,100% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1); } }
  @keyframes progressBar { from { width: 0; } to { width: 100%; } }

  .card-shine {
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
    background-size: 200% 100%;
    animation: shimmer 2.8s infinite;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">




const { useState, useEffect, useRef, useCallback } = React;

// ── Card data ─────────────────────────────────────────────────────────────────
const CARDS = {
  pc: { name: 'Pase Corto', img: 'imagenes/Pase corto.png', type: 'pass', label: 'PASE', color: '#10b981', value: '+1' },
  pl: { name: 'Pase Largo', img: 'imagenes/Pase largo.png', type: 'pass', label: 'PASE', color: '#3b82f6', value: '+2' },
  pa: { name: 'Pase Aéreo', img: 'imagenes/Pase aereo.png', type: 'pass', label: 'PASE', color: '#06b6d4', value: '+3' },
  tg: { name: 'Tirar a Gol', img: 'imagenes/Tirar a gol.png', type: 'shoot', label: 'DISPARO', color: '#ef4444' },
  ch: { name: 'Chilena', img: 'imagenes/Chilena.png', type: 'special', label: 'ESPECIAL', color: '#f97316' },
  ba: { name: 'Barrida', img: 'imagenes/barrida.png', type: 'defense', label: 'DEFENSA', color: '#64748b' },
  fa: { name: 'Falta Agresiva', img: 'imagenes/Falta agresiva.png', type: 'defense', label: 'FALTA', color: '#92400e' },
  pe: { name: 'Penalti', img: 'imagenes/Penalti.png', type: 'shoot', label: 'PENALTI', color: '#eab308' },
  pel: { name: 'Penalti Legendario', img: 'imagenes/penalti legendario.png', type: 'special', label: '★ LEGENDARIO', color: '#d97706' },
  off: { name: 'Offside', img: 'imagenes/Offside.png', type: 'save', label: 'DEFENSA', color: '#b45309' },
  paq: { name: 'Parada Arquero', img: 'imagenes/Parada del arquero.png', type: 'save', label: 'PARADA', color: '#78716c' },
  rem: { name: 'Remate', img: 'imagenes/Remate.png', type: 'special', label: 'REMATE', color: '#ec4899' },
  sb: { name: 'Saque de Banda', img: 'imagenes/Saque de banda.png', type: 'defense', label: 'BANDA', color: '#65a30d' },
  sc: { name: 'Saque de Corner', img: 'imagenes/Saque de corner.png', type: 'defense', label: 'CORNER', color: '#0369a1' },
  ta: { name: 'Tarjeta Amarilla', img: 'imagenes/Tarjeta amarilla.png', type: 'card', label: 'TARJETA', color: '#ca8a04' },
  tr: { name: 'Tarjeta Roja', img: 'imagenes/Tarjeta roja.png', type: 'card', label: 'TARJETA', color: '#dc2626' },
  var: { name: 'VAR', img: 'imagenes/var.png', type: 'var', label: 'VAR', color: '#7c3aed' },
  reg: { name: 'Regatear', img: 'imagenes/Regatear.png', type: 'counter', label: 'REGATE', color: '#0d9488' },
  cont: { name: 'Contraataque', img: 'imagenes/Contraataque.png', type: 'defense', label: 'CONTRA', color: '#4f46e5' }
};

// ── Card component ─────────────────────────────────────────────────────────────
const Card = ({ id, size = 'md', float = false, floatR = false, glow = false, dimmed = false, onClick, selected, badge }) => {
  const card = CARDS[id];
  if (!card) return null;
  const sizes = { sm: { w: 72, h: 100, fs: 8 }, md: { w: 96, h: 134, fs: 10 }, lg: { w: 116, h: 162, fs: 11 }, xl: { w: 140, h: 196, fs: 12 } };
  const s = sizes[size] || sizes.md;
  return (
    <div
      onClick={onClick}
      style={{
        position: 'relative',
        width: s.w, height: s.h,
        borderRadius: 14,
        overflow: 'hidden',
        border: selected ? '2px solid #22d3ee' : glow ? `2px solid ${card.color}` : '1.5px solid rgba(255,255,255,0.12)',
        boxShadow: glow ? `0 0 20px ${card.color}66, 0 8px 24px rgba(0,0,0,0.5)` : selected ? '0 0 16px #22d3ee66' : '0 6px 18px rgba(0,0,0,0.5)',
        animation: float ? 'cardFloat 3s ease-in-out infinite' : floatR ? 'cardFloatR 3s ease-in-out infinite' : undefined,
        opacity: dimmed ? 0.35 : 1,
        cursor: onClick ? 'pointer' : 'default',
        flexShrink: 0,
        transition: 'transform 0.2s, box-shadow 0.2s',
        transform: selected ? 'translateY(-6px)' : undefined
      }}>
      
      <img src={card.img} alt={card.name} style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center', display: 'block' }} />
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom, rgba(0,0,0,0.18) 0%, transparent 35%, rgba(0,0,0,0.32) 100%)' }} />
      <div style={{ position: 'absolute', top: 6, left: 6, background: card.color + 'dd', borderRadius: 6, padding: '2px 5px', fontSize: s.fs - 1, fontWeight: 900, letterSpacing: '0.1em', color: '#fff', lineHeight: 1 }}>{card.label}</div>
      {card.value && <div style={{ position: 'absolute', top: 6, right: 6, background: 'rgba(0,0,0,0.7)', borderRadius: 6, padding: '2px 5px', fontSize: s.fs - 1, fontWeight: 900, color: '#fff' }}>{card.value}</div>}
      {badge && <div style={{ position: 'absolute', bottom: 6, left: '50%', transform: 'translateX(-50%)', background: badge.bg || 'rgba(0,0,0,0.8)', borderRadius: 6, padding: '2px 8px', fontSize: s.fs, fontWeight: 900, color: badge.color || '#fff', whiteSpace: 'nowrap', border: '1px solid rgba(255,255,255,0.15)' }}>{badge.text}</div>}
      <div className="card-shine" style={{ position: 'absolute', inset: 0 }} />
    </div>);

};

// ── Arrow connector ─────────────────────────────────────────────────────────────
const Arrow = ({ label, color = '#22d3ee' }) =>
<div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, padding: '0 6px', flexShrink: 0 }}>
    {label && <span style={{ fontSize: 9, fontWeight: 900, color, letterSpacing: '0.08em', textTransform: 'uppercase' }}>{label}</span>}
    <svg width="28" height="20" viewBox="0 0 28 20">
      <defs><marker id={`arr-${label}`} markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill={color} /></marker></defs>
      <line x1="2" y1="10" x2="22" y2="10" stroke={color} strokeWidth="2.5" markerEnd={`url(#arr-${label})`} strokeDasharray="none" />
    </svg>
  </div>;


const VSLabel = () =>
<div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: 36, height: 36, background: 'rgba(255,255,255,0.06)', borderRadius: '50%', border: '1.5px solid rgba(255,255,255,0.12)', fontSize: 11, fontWeight: 900, color: 'rgba(255,255,255,0.5)', flexShrink: 0 }}>VS</div>;


// ── Section title ──────────────────────────────────────────────────────────────
const SectionTag = ({ children, color = '#22d3ee' }) =>
<div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: color + '18', border: `1.5px solid ${color}44`, borderRadius: 20, padding: '4px 12px', marginBottom: 10 }}>
    <span style={{ fontSize: 10, fontWeight: 900, color, letterSpacing: '0.15em', textTransform: 'uppercase' }}>{children}</span>
  </div>;


// ── Pill chip ──────────────────────────────────────────────────────────────────
const Chip = ({ children, color = '#22d3ee', icon }) =>
<div style={{ display: 'inline-flex', alignItems: 'center', gap: 5, background: color + '20', border: `1px solid ${color}55`, borderRadius: 20, padding: '5px 12px' }}>
    {icon && <span style={{ fontSize: 14 }}>{icon}</span>}
    <span style={{ fontSize: 12, fontWeight: 700, color, lineHeight: 1.3 }}>{children}</span>
  </div>;


// ── Info box ───────────────────────────────────────────────────────────────────
const InfoBox = ({ children, color = 'rgba(255,255,255,0.06)', border = 'rgba(255,255,255,0.1)' }) =>
<div style={{ background: color, border: `1.5px solid ${border}`, borderRadius: 14, padding: '14px 18px' }}>
    {children}
  </div>;


// ══════════════════════════════════════════════════════════════════════════════
// SLIDES
// ══════════════════════════════════════════════════════════════════════════════
const slides = [

// ── 0. Portada ─────────────────────────────────────────────────────────────
{
  id: 'cover',
  render: () =>
  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', gap: 28, padding: '40px 24px', textAlign: 'center' }}>
        <img src="imagenes/balon.png" alt="balón" style={{ width: 90, height: 90, borderRadius: '50%', boxShadow: '0 0 40px rgba(34,197,94,0.4), 0 16px 32px rgba(0,0,0,0.6)', animation: 'ballBounce 2.2s ease-in-out infinite' }} />
        <div>
          <div style={{ fontSize: 11, fontWeight: 900, letterSpacing: '0.35em', color: '#22c55e', textTransform: 'uppercase', marginBottom: 10 }}>Tutorial</div>
          <h1 style={{ fontSize: 44, fontWeight: 900, color: '#fff', letterSpacing: '-0.03em', lineHeight: 1, marginBottom: 12 }}>GOL MOBILE</h1>
          <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.55)', lineHeight: 1.6, maxWidth: 320 }}>Construye jugadas, supera a tu rival y marca 5 goles para ganar.</p>
        </div>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', justifyContent: 'center' }}>
          {['pc', 'tg', 'paq', 'ch', 'var'].map((id) => <Card key={id} id={id} size="sm" float />)}
        </div>
        <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.3)', marginTop: 8 }}>Desliza para comenzar →</div>
      </div>

},

// ── 1. Objetivo ────────────────────────────────────────────────────────────
{
  id: 'objetivo',
  render: () =>
  <SlideLayout title="El Objetivo" tag="Cómo ganar" tagColor="#22c55e">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16, width: '100%' }}>
          <InfoBox color="rgba(34,197,94,0.08)" border="rgba(34,197,94,0.25)">
            <div style={{ fontSize: 28, fontWeight: 900, color: '#22c55e', textAlign: 'center', marginBottom: 6 }}>Primero en marcar 5 goles</div>
            <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.6)', textAlign: 'center' }}>El jugador que alcance 5 goles gana la partida</div>
          </InfoBox>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            {[
        { icon: '🃏', title: '5 cartas', desc: 'Cada jugador empieza con 5 cartas en mano' },
        { icon: '⚽', title: 'Posesión', desc: 'Solo quien tiene el balón puede atacar' },
        { icon: '🔄', title: 'Turnos', desc: 'En un turno puedes Descartar cartas o jugar las cartas disponibles. Si decides jugar, ya no puedes descartar.' },
        { icon: '🏆', title: 'Meta: 5 goles', desc: 'Para anotar goles, debes sumar 4 pases, lo que te habilita a Tirar a gol.' }].
        map(({ icon, title, desc }) =>
        <div key={title} style={{ background: 'rgba(255,255,255,0.05)', border: '1.5px solid rgba(255,255,255,0.08)', borderRadius: 14, padding: '14px 12px', display: 'flex', flexDirection: 'column', gap: 6 }}>
                <div style={{ fontSize: 22 }}>{icon}</div>
                <div style={{ fontSize: 13, fontWeight: 800, color: '#fff' }}>{title}</div>
                <div style={{ fontSize: 11, lineHeight: 1.4, color: "rgb(251, 250, 250)" }}>{desc}</div>
              </div>
        )}
          </div>
        </div>
      </SlideLayout>

},

// ── 2. Posesión ────────────────────────────────────────────────────────────
{
  id: 'posesion',
  render: () =>
  <SlideLayout title="La Posesión" tag="Mecánica base" tagColor="#06b6d4">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16, width: '100%' }}>
          <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.65)', lineHeight: 1.6 }}>
            Solo el jugador con posesión del balón puede hacer jugadas ofensivas. El rival debe intentar recuperarlo.
          </p>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 20, padding: '18px 0' }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10 }}>
              <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'linear-gradient(135deg, #22c55e, #15803d)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 900, color: '#fff', letterSpacing: '0.05em', boxShadow: '0 0 20px rgba(34,197,94,0.4)', border: '2px solid rgba(34,197,94,0.6)' }}>TÚ</div>
              <img src="imagenes/balon.png" style={{ width: 32, height: 32, borderRadius: '50%', boxShadow: '0 0 12px rgba(34,197,94,0.5)' }} alt="balón" />
              <div style={{ fontSize: 10, fontWeight: 800, color: '#22c55e', letterSpacing: '0.1em' }}>CON BALÓN</div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10, alignItems: 'center' }}>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', letterSpacing: '0.08em' }}>PUEDE JUGAR</div>
              <div style={{ display: 'flex', gap: 6 }}>
                {['pc', 'pl', 'pa', 'tg'].map((id) => <Card key={id} id={id} size="sm" glow />)}
              </div>
              <div style={{ fontSize: 10, color: '#22d3ee', fontWeight: 700 }}>Pases + Tiro a Gol</div>
            </div>
          </div>
          <InfoBox color="rgba(239,68,68,0.07)" border="rgba(239,68,68,0.2)">
            <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.7)', lineHeight: 1.5 }}>
              <strong style={{ color: '#f87171' }}>Sin posesión:</strong> solo puedes jugar cartas defensivas como Barrida, Contraataque, Saque de Banda o Saque de Corner para recuperar el balón.
            </div>
          </InfoBox>
        </div>
      </SlideLayout>

},

// ── 3. Pases ───────────────────────────────────────────────────────────────
{
  id: 'pases',
  render: () => {
    const [step, setStep] = useState(0);
    const passes = [
    { id: 'pc', desc: 'El más común. Avanza poco pero es fácil de jugar.', value: 1 },
    { id: 'pl', desc: 'Más difícil de conseguir, pero avanza más.', value: 2 },
    { id: 'pa', desc: 'Pase largo por el aire. El más poderoso — habilita la Chilena.', value: 3 }];

    return (
      <SlideLayout title="Los Pases" tag="Construye la jugada" tagColor="#10b981">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14, width: '100%' }}>
            <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.6)', lineHeight: 1.5 }}>Los pases son la base de toda jugada. Cada uno suma valor a tu ataque acumulado.</p>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
              {passes.map(({ id }, i) =>
            <div key={id} onClick={() => setStep(i)} style={{ cursor: 'pointer', transform: step === i ? 'scale(1.08)' : 'scale(0.92)', transition: 'transform 0.2s', opacity: step === i ? 1 : 0.55 }}>
                  <Card id={id} size="md" glow={step === i} />
                </div>
            )}
            </div>
            {passes[step] &&
          <InfoBox color={`${CARDS[passes[step].id].color}18`} border={`${CARDS[passes[step].id].color}44`}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <div style={{ width: 40, height: 40, borderRadius: '50%', background: CARDS[passes[step].id].color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, fontWeight: 900, color: '#fff', flexShrink: 0 }}>+{passes[step].value}</div>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 800, color: '#fff', marginBottom: 3 }}>{CARDS[passes[step].id].name}</div>
                    <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', lineHeight: 1.4 }}>{passes[step].desc}</div>
                  </div>
                </div>
              </InfoBox>
          }
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.3)', textAlign: 'center' }}>Toca cada carta para ver más</div>
          </div>
        </SlideLayout>);

  }
},

// ── 4. Jugada básica ───────────────────────────────────────────────────────
{
  id: 'jugada',
  render: () =>
  <SlideLayout title="La Jugada Básica" tag="Flujo de ataque" tagColor="#ef4444">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16, width: '100%' }}>
          <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.6)', lineHeight: 1.5 }}>Para anotar un gol necesitas construir una secuencia de pases (que sumen 4 pases en total) y cerrarla con un Tiro a Gol.</p>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, flexWrap: 'wrap', padding: '8px 0' }}>
            <Card id="pc" size="sm" />
            <Arrow label="→" color="#10b981" />
            <Card id="pl" size="sm" />
            <Arrow label="→" color="#10b981" />
            <Card id="pa" size="sm" />
            <Arrow label="→" color="#ef4444" />
            <Card id="tg" size="sm" glow />
          </div>
          <InfoBox color="rgba(239,68,68,0.07)" border="rgba(239,68,68,0.25)">
            <div style={{ fontSize: 13, fontWeight: 800, color: '#f87171', marginBottom: 8 }}>⚡ Tirar a Gol</div>
            <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.65)', lineHeight: 1.5 }}>Cuando juegas Tirar a Gol, el rival tiene la oportunidad de responder con <strong style={{ color: '#a78bfa' }}>Parada Arquero</strong> u <strong style={{ color: '#d97706' }}>Offside</strong>. Si no tiene ninguna de esas cartas, ¡es GOL!</div>
          </InfoBox>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'center', alignItems: 'center' }}>
            <Card id="tg" size="sm" />
            <Arrow label="rival responde" color="rgba(255,255,255,0.3)" />
            <div style={{ display: 'flex', gap: 6 }}>
              <Card id="paq" size="sm" />
              <Card id="off" size="sm" />
            </div>
          </div>
        </div>
      </SlideLayout>

},

// ── 5. Parada + Remate ────────────────────────────────────────────────────
{
  id: 'parada',
  render: () =>
  <SlideLayout title="Parada y Remate" tag="Respuesta defensiva" tagColor="#78716c">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14, width: '100%' }}>
          <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.6)', lineHeight: 1.5 }}>Cuando el rival para tu tiro, aún puedes intentar un Remate.</p>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {/* Tiro */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <Card id="tg" size="sm" />
              <div style={{ flex: 1, height: 2, background: 'rgba(239,68,68,0.4)', borderRadius: 2 }} />
              <Card id="paq" size="sm" />
              <div style={{ fontSize: 11, color: '#78716c', fontWeight: 700 }}>PARA</div>
            </div>
            {/* Remate */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, paddingLeft: 30 }}>
              <div style={{ fontSize: 11, color: '#ec4899', fontWeight: 700 }}>↳</div>
              <Card id="rem" size="sm" glow />
              <div style={{ flex: 1, height: 2, background: 'rgba(239,68,68,0.4)', borderRadius: 2 }} />
              <div style={{ fontSize: 22 }}>⚽</div>
              <div style={{ fontSize: 11, color: '#22c55e', fontWeight: 900 }}>GOL</div>
            </div>
          </div>

          <InfoBox color="rgba(78,70,60,0.2)" border="rgba(255,255,255,0.1)">
            <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', lineHeight: 1.5 }}>
              <strong style={{ color: '#d6d3d1' }}>Parada Arquero</strong> es tu última línea de defensa ante un Tiro a Gol o un Penalti. Guárdala bien — solo funciona si la tienes en mano cuando el rival dispara.
            </div>
          </InfoBox>
        </div>
      </SlideLayout>

},

// ── 6. Chilena ─────────────────────────────────────────────────────────────
{
  id: 'chilena',
  render: () =>
  <SlideLayout title="La Chilena" tag="Carta legendaria" tagColor="#f97316">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14, width: '100%' }}>
          <div style={{ display: 'flex', justifyContent: 'center' }}>
            <Card id="ch" size="lg" glow float />

    <div>

// ══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [current, setCurrent] = useState(() => {
    const saved = localStorage.getItem('gol-tutorial-slide');
    const n = parseInt(saved, 10);
    return isNaN(n) ? 0 : Math.min(n, slides.length - 1);
  });
  const [dir, setDir] = useState(1);
  const [animKey, setAnimKey] = useState(0);
  const touchStartX = useRef(null);

  const goTo = useCallback((next, direction) => {
    const clamped = Math.max(0, Math.min(slides.length - 1, next));
    setDir(direction);
    setAnimKey((k) => k + 1);
    setCurrent(clamped);
    localStorage.setItem('gol-tutorial-slide', clamped);
  }, []);

  const next = () => goTo(current + 1, 1);
  const prev = () => goTo(current - 1, -1);

  const handleTouchStart = (e) => {touchStartX.current = e.touches[0].clientX;};
  const handleTouchEnd = (e) => {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    if (Math.abs(dx) > 50) {dx < 0 ? next() : prev();}
    touchStartX.current = null;
  };

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [current]);

  const progress = current / (slides.length - 1) * 100;
  const animStyle = { animation: `${dir > 0 ? 'slideLeft' : 'slideRight'} 0.32s cubic-bezier(0.4,0,0.2,1) both` };
  const Slide = slides[current];

  return (
    <div
      style={{ display: 'flex', flexDirection: 'column', height: '100%', background: '#060d14', userSelect: 'none' }}
      onTouchStart={handleTouchStart}
      onTouchEnd={handleTouchEnd}>
      
      {/* Top bar */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px 8px', flexShrink: 0 }}>
        <img src="imagenes/balon.png" alt="gol" style={{ width: 24, height: 24, borderRadius: '50%', opacity: 0.9 }} />
        <div style={{ fontSize: 13, fontWeight: 900, color: 'rgba(255,255,255,0.85)', letterSpacing: '0.05em' }}>GOL</div>
        <div style={{ flex: 1 }} />
        <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.3)', fontWeight: 700 }}>{current + 1} / {slides.length}</div>
      </div>

      {/* Progress bar */}
      <div style={{ height: 3, background: 'rgba(255,255,255,0.06)', flexShrink: 0, margin: '0 16px', borderRadius: 2 }}>
        <div style={{ height: '100%', width: `${progress}%`, background: 'linear-gradient(90deg, #22c55e, #16a34a)', borderRadius: 2, transition: 'width 0.35s cubic-bezier(0.4,0,0.2,1)' }} />
      </div>

      {/* Slide dots */}
      <div style={{ display: 'flex', gap: 4, justifyContent: 'center', padding: '8px 16px 0', flexShrink: 0, flexWrap: 'wrap' }}>
        {slides.map((s, i) =>
        <div key={s.id} onClick={() => goTo(i, i > current ? 1 : -1)}
        style={{ width: i === current ? 20 : 6, height: 6, borderRadius: 3, background: i === current ? '#22c55e' : i < current ? 'rgba(34,197,94,0.4)' : 'rgba(255,255,255,0.12)', transition: 'all 0.3s', cursor: 'pointer' }} />
        )}
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflow: 'hidden', position: 'relative', margin: '8px 0 0' }}>
        <div key={`${current}-${animKey}`} style={{ ...animStyle, height: '100%' }}>
          <Slide.render />
        </div>
      </div>

      {/* Nav buttons */}
      <div style={{ display: 'flex', gap: 10, padding: '10px 16px 16px', flexShrink: 0 }}>
        <button
          onClick={prev}
          disabled={current === 0}
          style={{ flex: 1, height: 48, borderRadius: 14, background: current === 0 ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.08)', border: '1.5px solid rgba(255,255,255,0.1)', color: current === 0 ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.75)', fontSize: 14, fontWeight: 700, cursor: current === 0 ? 'default' : 'pointer', transition: 'all 0.2s', letterSpacing: '0.02em' }}>
          ← Anterior</button>
        <button
          onClick={next}
          disabled={current === slides.length - 1}
          style={{ flex: 2, height: 48, borderRadius: 14, background: current === slides.length - 1 ? 'rgba(34,197,94,0.1)' : 'linear-gradient(135deg, #16a34a, #15803d)', border: current === slides.length - 1 ? '1.5px solid rgba(34,197,94,0.3)' : 'none', color: current === slides.length - 1 ? 'rgba(34,197,94,0.5)' : '#fff', fontSize: 14, fontWeight: 800, cursor: current === slides.length - 1 ? 'default' : 'pointer', transition: 'all 0.2s', letterSpacing: '0.02em', boxShadow: current === slides.length - 1 ? 'none' : '0 4px 16px rgba(22,163,74,0.4)' }}>
          {current === slides.length - 1 ? '¡Ya sé jugar!' : 'Siguiente →'}</button>
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
